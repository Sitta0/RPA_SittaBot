[credenciais]
; Preencha com as credenciais da conta de serviço.
; ⚠️  NUNCA versione este arquivo preenchido no Git.
; Renomeie para config.ini antes de usar.
email = seu_email@empresa.com
senha = sua_senha_aqui

[sistema]
; URLs do sistema alvo. Ajuste conforme o ambiente.
url_login     = https://seudominio.com/#/login
url_parcelas  = https://seudominio.com/#/relatorio/parcelas
url_emitidos  = https://seudominio.com/#/relatorio/meus-relatorios/emitidos

; Texto exato do botão de login SSO exibido na tela de login (case-sensitive).
sso_button_text = SSO Login

; Nome exato do item de relatório a clicar no menu de opções (case-sensitive).
nome_relatorio = Relatório

; Caminho do executável do Microsoft Edge.
; Deixe comentado para usar o caminho padrão de instalação do Windows.
; edge_path = C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
